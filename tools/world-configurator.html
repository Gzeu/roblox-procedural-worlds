<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Configurator v3.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;flex-direction:column;min-height:100vh}
header{background:#16213e;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #0f3460}
header h1{font-size:1.3rem;color:#e94560;letter-spacing:1px}header span{font-size:.8rem;color:#888;background:#0f3460;padding:2px 8px;border-radius:12px}
.main{display:flex;flex:1;gap:0}
.sidebar{width:340px;background:#16213e;padding:16px;overflow-y:auto;border-right:1px solid #0f3460}
.preview-area{flex:1;display:flex;flex-direction:column}
.controls{padding:16px;background:#1a1a2e;border-bottom:1px solid #0f3460;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
btn,button,.btn{background:#0f3460;color:#e0e0e0;border:1px solid #e94560;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
btn:hover,button:hover,.btn:hover{background:#e94560;color:#fff}
.preset-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.section{margin-bottom:14px}
.section h3{color:#e94560;font-size:.8rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #0f3460;padding-bottom:4px}
label{display:block;font-size:.78rem;color:#aaa;margin-bottom:2px}
input[type=range]{width:100%;accent-color:#e94560}
input[type=number],select,input[type=text]{width:100%;background:#0f3460;color:#e0e0e0;border:1px solid #0f3460;border-radius:4px;padding:4px 8px;font-size:.82rem}
.val{color:#e94560;font-weight:bold;float:right}
.biome-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.biome-check{display:flex;align-items:center;gap:6px;font-size:.8rem;padding:4px 8px;background:#0f3460;border-radius:4px}
.biome-check input{accent-color:#e94560}
.tab-bar{display:flex;background:#16213e;border-bottom:1px solid #0f3460}
.tab{padding:10px 20px;cursor:pointer;font-size:.82rem;color:#888;border-bottom:2px solid transparent}
.tab.active{color:#e94560;border-bottom-color:#e94560}
.tab-content{display:none;padding:16px;flex:1;overflow:auto}
.tab-content.active{display:flex;flex-direction:column}
#canvas2d{display:block;width:100%;height:420px;background:#000;border-radius:6px}
#canvas3d{display:block;width:100%;height:420px;background:#000;border-radius:6px}
code{display:block;background:#0d0d0d;border:1px solid #333;padding:10px;border-radius:6px;font-size:.78rem;color:#80ff80;word-break:break-all}
.history-btns{display:flex;gap:6px;align-items:center}
.custom-presets{margin-top:8px}
.custom-preset-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #0f3460}
.custom-preset-item span{flex:1;font-size:.8rem}
.share-box{margin-top:8px;display:flex;gap:6px}
.share-box input{flex:1;font-size:.72rem;color:#aaa}
#history-info{font-size:.75rem;color:#888;margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>🌍 World Configurator</h1>
  <span>v3.0</span>
  <span id="seed-display">seed: 42</span>
  <div style="margin-left:auto;display:flex;gap:6px">
    <button onclick="undo()" title="Ctrl+Z">↩ Undo</button>
    <button onclick="redo()" title="Ctrl+Y">↪ Redo</button>
    <span id="history-info">history: 0/20</span>
  </div>
</header>

<div class="main">
<!-- ======= SIDEBAR ======= -->
<div class="sidebar">
  <div class="section">
    <h3>Presets</h3>
    <div class="preset-bar">
      <button onclick="applyPreset('survival')">🏝 Survival Island</button>
      <button onclick="applyPreset('volcanic')">🌋 Volcanic Wasteland</button>
      <button onclick="applyPreset('arctic')">❄ Arctic Tundra</button>
      <button onclick="applyPreset('medieval')">🏰 Medieval</button>
      <button onclick="applyPreset('scifi')">🚀 Sci-Fi</button>
      <button onclick="applyPreset('horror')">💀 Horror</button>
    </div>
    <div class="custom-presets">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
        <input type="text" id="preset-name" placeholder="My Preset Name" style="flex:1">
        <button onclick="saveCustomPreset()">💾 Save</button>
      </div>
      <div id="custom-preset-list"></div>
    </div>
  </div>

  <div class="section">
    <h3>World</h3>
    <label>Seed <span class="val" id="vSeed">42</span></label>
    <input type="number" id="seed" value="42" oninput="onSeedChange()">
    <label style="margin-top:8px">World Size <span class="val" id="vSize">256</span></label>
    <input type="range" id="worldSize" min="64" max="512" step="64" value="256" oninput="onSlider('worldSize','vSize')">
    <label style="margin-top:8px">Max Height <span class="val" id="vMH">120</span></label>
    <input type="range" id="maxHeight" min="40" max="300" step="10" value="120" oninput="onSlider('maxHeight','vMH')">
    <label style="margin-top:8px">Water Level <span class="val" id="vWL">20</span></label>
    <input type="range" id="waterLevel" min="5" max="100" step="5" value="20" oninput="onSlider('waterLevel','vWL')">
    <label style="margin-top:8px">Noise Scale <span class="val" id="vNS">0.008</span></label>
    <input type="range" id="noiseScale" min="0.002" max="0.02" step="0.001" value="0.008" oninput="onSlider('noiseScale','vNS')">
  </div>

  <div class="section">
    <h3>Biomes</h3>
    <div class="biome-grid" id="biome-grid"></div>
  </div>

  <div class="section">
    <h3>Features</h3>
    <label>Rivers <span class="val" id="vRivers">4</span></label>
    <input type="range" id="rivers" min="0" max="12" step="1" value="4" oninput="onSlider('rivers','vRivers')">
    <label style="margin-top:8px">River Depth <span class="val" id="vRD">6</span></label>
    <input type="range" id="riverDepth" min="2" max="20" step="1" value="6" oninput="onSlider('riverDepth','vRD')">
    <label style="margin-top:8px">Dungeon Rooms <span class="val" id="vDR">6</span></label>
    <input type="range" id="dungeonRooms" min="0" max="20" step="1" value="6" oninput="onSlider('dungeonRooms','vDR')">
    <label style="margin-top:8px">Structures <span class="val" id="vStr">5</span></label>
    <input type="range" id="structures" min="0" max="20" step="1" value="5" oninput="onSlider('structures','vStr')">
    <label style="margin-top:8px">Prop Density <span class="val" id="vPD">0.04</span></label>
    <input type="range" id="propDensity" min="0.01" max="0.15" step="0.01" value="0.04" oninput="onSlider('propDensity','vPD')">
  </div>

  <div class="section">
    <h3>Export</h3>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button onclick="copyCmd()">📋 Copy Command</button>
      <button onclick="exportJSON()">⬇ Download JSON</button>
    </div>
    <code id="cmd-box" style="margin-top:8px">python tools/build_world.py world_config.json</code>
    <div class="share-box">
      <input type="text" id="share-url" readonly placeholder="Share URL will appear here">
      <button onclick="generateShareLink()">🔗 Share Link</button>
      <button onclick="copyShareLink()">📋 Copy</button>
    </div>
  </div>
</div>

<!-- ======= PREVIEW ======= -->
<div class="preview-area">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('2d',this)">2D Terrain</div>
    <div class="tab" onclick="switchTab('3d',this)">3D Isometric</div>
  </div>
  <div class="tab-content active" id="tab-2d">
    <canvas id="canvas2d"></canvas>
    <div style="text-align:center;padding:8px;font-size:.75rem;color:#666">
      SPACE = random seed | Click biomes to toggle | sliders auto-refresh
    </div>
  </div>
  <div class="tab-content" id="tab-3d">
    <canvas id="canvas3d"></canvas>
    <div style="text-align:center;padding:8px;font-size:.75rem;color:#666">
      Isometric 3D preview (Three.js inline) — rotate: drag | zoom: scroll
    </div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===================== NOISE =====================
function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+t*(b-a)}
let _perm=[];
function buildPerm(seed){
  let p=Array.from({length:256},(_,i)=>i);
  let s=seed|0;
  for(let i=255;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;let j=((s>>>0)%(i+1));[p[i],p[j]]=[p[j],p[i]]}
  _perm=[...p,...p];
}
function grad(h,x,y){h&=3;if(h===0)return x+y;if(h===1)return -x+y;if(h===2)return x-y;return -x-y}
function perlin(x,y){
  let xi=Math.floor(x)&255,yi=Math.floor(y)&255;
  let xf=x-Math.floor(x),yf=y-Math.floor(y);
  let u=fade(xf),v=fade(yf);
  let aa=_perm[_perm[xi]+yi],ab=_perm[_perm[xi]+yi+1],ba=_perm[_perm[xi+1]+yi],bb=_perm[_perm[xi+1]+yi+1];
  return lerp(lerp(grad(aa,xf,yf),grad(ba,xf-1,yf),u),lerp(grad(ab,xf,yf-1),grad(bb,xf-1,yf-1),u),v);
}
function fbm(x,y,oct=6){
  let val=0,amp=0.5,freq=1;
  for(let i=0;i<oct;i++){val+=amp*perlin(x*freq,y*freq);amp*=0.5;freq*=2;}
  return val;
}

// ===================== STATE & HISTORY =====================
const BIOME_LIST=['Forest','Desert','Swamp','Volcanic','Tundra','Ocean'];
let history=[],histIdx=-1;
function getState(){
  return {
    seed:+document.getElementById('seed').value,
    worldSize:+document.getElementById('worldSize').value,
    maxHeight:+document.getElementById('maxHeight').value,
    waterLevel:+document.getElementById('waterLevel').value,
    noiseScale:+document.getElementById('noiseScale').value,
    rivers:+document.getElementById('rivers').value,
    riverDepth:+document.getElementById('riverDepth').value,
    dungeonRooms:+document.getElementById('dungeonRooms').value,
    structures:+document.getElementById('structures').value,
    propDensity:+document.getElementById('propDensity').value,
    biomes:BIOME_LIST.filter(b=>document.getElementById('biome-'+b)?.checked)
  };
}
function setState(s,skipPush){
  document.getElementById('seed').value=s.seed;
  document.getElementById('vSeed').textContent=s.seed;
  document.getElementById('seed-display').textContent='seed: '+s.seed;
  ['worldSize','maxHeight','waterLevel','noiseScale','rivers','riverDepth',
   'dungeonRooms','structures','propDensity'].forEach(k=>{
    document.getElementById(k).value=s[k];
  });
  updateAllVals();
  BIOME_LIST.forEach(b=>{
    const el=document.getElementById('biome-'+b);
    if(el) el.checked=(s.biomes||[]).includes(b);
  });
  if(!skipPush) pushHistory(s);
  updateAll();
}
function pushHistory(s){
  history=history.slice(0,histIdx+1);
  history.push(JSON.parse(JSON.stringify(s)));
  if(history.length>20) history.shift();
  histIdx=history.length-1;
  updateHistInfo();
}
function updateHistInfo(){
  document.getElementById('history-info').textContent=`history: ${histIdx+1}/${history.length}`;
}
function undo(){
  if(histIdx>0){histIdx--;setState(history[histIdx],true);updateHistInfo();}
}
function redo(){
  if(histIdx<history.length-1){histIdx++;setState(history[histIdx],true);updateHistInfo();}
}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
  if(e.code==='Space'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();randomSeed();}
});

// ===================== BIOME GRID =====================
function buildBiomeGrid(){
  const g=document.getElementById('biome-grid');
  g.innerHTML='';
  BIOME_LIST.forEach(b=>{
    const d=document.createElement('div');
    d.className='biome-check';
    d.innerHTML=`<input type="checkbox" id="biome-${b}" checked onchange="onBiomeChange()"><label for="biome-${b}">${b}</label>`;
    g.appendChild(d);
  });
}
buildBiomeGrid();

// ===================== SLIDERS =====================
function onSlider(id,vid){
  document.getElementById(vid).textContent=document.getElementById(id).value;
  pushHistory(getState());
  updateAll();
}
function onSeedChange(){
  const v=document.getElementById('seed').value;
  document.getElementById('vSeed').textContent=v;
  document.getElementById('seed-display').textContent='seed: '+v;
  pushHistory(getState());
  updateAll();
}
function onBiomeChange(){pushHistory(getState());updateAll();}
function updateAllVals(){
  [['worldSize','vSize'],['maxHeight','vMH'],['waterLevel','vWL'],['noiseScale','vNS'],
   ['rivers','vRivers'],['riverDepth','vRD'],['dungeonRooms','vDR'],['structures','vStr'],['propDensity','vPD']
  ].forEach(([id,vid])=>{const el=document.getElementById(vid);if(el)el.textContent=document.getElementById(id).value;});
}
function randomSeed(){
  const s=Math.floor(Math.random()*999999);
  document.getElementById('seed').value=s;
  document.getElementById('vSeed').textContent=s;
  document.getElementById('seed-display').textContent='seed: '+s;
  pushHistory(getState());
  updateAll();
}

// ===================== PRESETS =====================
const PRESETS={
  survival:{seed:1001,worldSize:256,maxHeight:100,waterLevel:30,noiseScale:0.009,rivers:3,riverDepth:5,dungeonRooms:4,structures:3,propDensity:0.05,biomes:['Forest','Beach','Ocean']},
  volcanic:{seed:2002,worldSize:256,maxHeight:180,waterLevel:10,noiseScale:0.007,rivers:1,riverDepth:8,dungeonRooms:3,structures:6,propDensity:0.04,biomes:['Volcanic','Desert']},
  arctic:  {seed:3003,worldSize:256,maxHeight:140,waterLevel:15,noiseScale:0.006,rivers:2,riverDepth:4,dungeonRooms:5,structures:4,propDensity:0.03,biomes:['Tundra','Ocean']},
  medieval:{seed:4004,worldSize:256,maxHeight:110,waterLevel:20,noiseScale:0.008,rivers:5,riverDepth:6,dungeonRooms:8,structures:10,propDensity:0.06,biomes:['Forest','Swamp','Desert']},
  scifi:   {seed:5005,worldSize:256,maxHeight:200,waterLevel:5, noiseScale:0.01, rivers:0,riverDepth:4,dungeonRooms:12,structures:8,propDensity:0.02,biomes:['Volcanic','Desert']},
  horror:  {seed:6006,worldSize:256,maxHeight:90, waterLevel:25,noiseScale:0.012,rivers:4,riverDepth:7,dungeonRooms:10,structures:7,propDensity:0.08,biomes:['Swamp','Forest']}
};
function applyPreset(key){setState(PRESETS[key]);}

// ===================== CUSTOM PRESETS (localStorage) =====================
function saveCustomPreset(){
  const name=document.getElementById('preset-name').value.trim();
  if(!name) return;
  const saved=JSON.parse(localStorage.getItem('customPresets')||'{}');
  saved[name]=getState();
  localStorage.setItem('customPresets',JSON.stringify(saved));
  renderCustomPresets();
}
function loadCustomPreset(name){
  const saved=JSON.parse(localStorage.getItem('customPresets')||'{}');
  if(saved[name]) setState(saved[name]);
}
function deleteCustomPreset(name){
  const saved=JSON.parse(localStorage.getItem('customPresets')||'{}');
  delete saved[name];
  localStorage.setItem('customPresets',JSON.stringify(saved));
  renderCustomPresets();
}
function renderCustomPresets(){
  const list=document.getElementById('custom-preset-list');
  const saved=JSON.parse(localStorage.getItem('customPresets')||'{}');
  list.innerHTML='';
  Object.keys(saved).forEach(name=>{
    const d=document.createElement('div');
    d.className='custom-preset-item';
    d.innerHTML=`<span>${name}</span><button onclick="loadCustomPreset('${name}')">Load</button><button onclick="deleteCustomPreset('${name}')">✕</button>`;
    list.appendChild(d);
  });
}
renderCustomPresets();

// ===================== SHARE VIA URL HASH =====================
function generateShareLink(){
  const s=getState();
  const b64=btoa(JSON.stringify(s));
  const url=location.href.split('#')[0]+'#cfg='+b64;
  document.getElementById('share-url').value=url;
  history.replaceState(null,'',url);
}
function copyShareLink(){
  const u=document.getElementById('share-url').value;
  if(u) navigator.clipboard.writeText(u);
}
function loadFromHash(){
  const hash=location.hash;
  if(hash.startsWith('#cfg=')){
    try{const s=JSON.parse(atob(hash.slice(5)));setState(s);}catch(e){}
  }
}
loadFromHash();

// ===================== EXPORT =====================
function copyCmd(){
  const s=getState();
  const cmd=`python tools/build_world.py world_config.json --output output/world.rbxlx`;
  navigator.clipboard.writeText(cmd);
  document.getElementById('cmd-box').textContent=cmd;
}
function exportJSON(){
  const s=getState();
  const blob=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='world_config.json';a.click();
}

// ===================== HEIGHTMAP GEN =====================
function genHeightmap(cfg,size){
  buildPerm(cfg.seed);
  const sc=cfg.noiseScale;
  const mH=cfg.maxHeight;
  const off=cfg.seed*0.01;
  const hmap=[];
  for(let z=0;z<size;z++){
    hmap.push([]);
    for(let x=0;x<size;x++){
      const n=fbm((x+off)*sc,(z+off)*sc);
      hmap[z].push(Math.max(0,Math.min(1,(n+1)/2))*mH);
    }
  }
  return hmap;
}

// ===================== 2D PREVIEW =====================
const BIOME_COLORS_2D={
  Ocean:'#1771b8',Beach:'#d7c59a',Forest:'#6a7f3f',Swamp:'#4b6437',
  Desert:'#dac89e',Volcanic:'#69402a',Tundra:'#c3cdd7'
};
function getBiome2D(h,cfg){
  const wL=cfg.waterLevel,mH=cfg.maxHeight,frac=h/mH;
  if(h<=wL) return 'Ocean';
  if(frac<0.15) return 'Beach';
  const bl=cfg.biomes||['Forest'];
  if(bl.includes('Volcanic')&&frac>0.85) return 'Volcanic';
  if(bl.includes('Tundra')&&frac>0.75) return 'Tundra';
  if(bl.includes('Swamp')&&frac<0.25) return 'Swamp';
  if(bl.includes('Desert')&&frac<0.35) return 'Desert';
  return bl[0]||'Forest';
}
function draw2D(){
  const c=document.getElementById('canvas2d');
  const ctx=c.getContext('2d');
  c.width=c.offsetWidth||600;
  c.height=c.offsetHeight||420;
  const cfg=getState();
  const size=128;
  const cw=c.width,ch=c.height;
  const csx=cw/size,csy=ch/size;
  const hmap=genHeightmap(cfg,size);
  for(let z=0;z<size;z++){
    for(let x=0;x<size;x++){
      const h=hmap[z][x];
      const bm=getBiome2D(h,cfg);
      let col=BIOME_COLORS_2D[bm]||'#888';
      // Darken by height for shading
      const bright=0.7+0.3*(h/cfg.maxHeight);
      ctx.fillStyle=shadeColor(col,bright);
      ctx.fillRect(x*csx,z*csy,Math.ceil(csx),Math.ceil(csy));
    }
  }
  // Overlay rivers (just draw blue streaks along low valleys)
  ctx.strokeStyle='#3af';
  ctx.lineWidth=2;
  // We simply hint rivers from lowest points at top/bottom edges
  for(let r=0;r<cfg.rivers;r++){
    ctx.beginPath();
    let rx=Math.floor((r+1)*size/(cfg.rivers+1));
    ctx.moveTo(rx*csx,0);
    for(let z=0;z<size;z++){
      let best=rx,bestH=Infinity;
      for(let dx=-3;dx<=3;dx++){const nx=Math.max(0,Math.min(size-1,rx+dx));if(hmap[z][nx]<bestH){bestH=hmap[z][nx];best=nx;}}
      rx=best;
      ctx.lineTo(rx*csx,z*csy);
    }
    ctx.stroke();
  }
}
function shadeColor(hex,f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

// ===================== 3D ISOMETRIC (Three.js) =====================
let renderer3d=null,scene3d=null,camera3d=null,animFrame=null;
function init3D(){
  const c=document.getElementById('canvas3d');
  if(!renderer3d){
    renderer3d=new THREE.WebGLRenderer({canvas:c,antialias:true});
    renderer3d.setPixelRatio(window.devicePixelRatio);
  }
  renderer3d.setSize(c.offsetWidth||600,c.offsetHeight||420);
  scene3d=new THREE.Scene();
  scene3d.background=new THREE.Color(0x1a1a2e);
  camera3d=new THREE.PerspectiveCamera(45,(c.offsetWidth||600)/(c.offsetHeight||420),0.1,2000);
  camera3d.position.set(120,200,200);
  camera3d.lookAt(0,0,0);
  // Lights
  scene3d.add(new THREE.AmbientLight(0xffffff,0.5));
  const dl=new THREE.DirectionalLight(0xfff8e0,1.2);
  dl.position.set(100,200,100);
  scene3d.add(dl);
  // Terrain mesh
  const cfg=getState();
  const S=64;
  buildPerm(cfg.seed);
  const geo=new THREE.PlaneGeometry(200,200,S-1,S-1);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  const BIOME_HEX={
    Ocean:0x1771b8,Beach:0xd7c59a,Forest:0x6a7f3f,Swamp:0x4b6437,
    Desert:0xdac89e,Volcanic:0x69402a,Tundra:0xc3cdd7
  };
  const colors=[];
  for(let i=0;i<pos.count;i++){
    const x=(pos.getX(i)/200+0.5)*S;
    const z=(pos.getZ(i)/200+0.5)*S;
    const sc=cfg.noiseScale;
    const off=cfg.seed*0.01;
    const n=fbm((x+off)*sc,(z+off)*sc);
    const h=Math.max(0,Math.min(1,(n+1)/2))*cfg.maxHeight;
    pos.setY(i,h);
    const bm=getBiome2D(h,cfg);
    const hex=BIOME_HEX[bm]||0x888888;
    const c3=new THREE.Color(hex);
    colors.push(c3.r,c3.g,c3.b);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mat=new THREE.MeshPhongMaterial({vertexColors:true,shininess:10});
  const mesh=new THREE.Mesh(geo,mat);
  scene3d.add(mesh);
  // Orbit-like drag
  let drag=false,lastX=0,lastY=0,theta=0.6,phi=0.8,radius=280;
  c.onmousedown=e=>{drag=true;lastX=e.clientX;lastY=e.clientY;};
  c.onmouseup=()=>{drag=false;};
  c.onmousemove=e=>{
    if(!drag) return;
    theta-=(e.clientX-lastX)*0.005;
    phi=Math.max(0.1,Math.min(1.5,phi-(e.clientY-lastY)*0.005));
    lastX=e.clientX;lastY=e.clientY;
    camera3d.position.set(radius*Math.sin(theta)*Math.cos(phi),radius*Math.sin(phi),radius*Math.cos(theta)*Math.cos(phi));
    camera3d.lookAt(0,cfg.maxHeight/2,0);
  };
  c.onwheel=e=>{radius=Math.max(80,Math.min(600,radius+e.deltaY*0.2));camera3d.position.setLength(radius);};
  if(animFrame) cancelAnimationFrame(animFrame);
  function animate(){animFrame=requestAnimationFrame(animate);renderer3d.render(scene3d,camera3d);}
  animate();
}

// ===================== TABS =====================
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='3d') setTimeout(init3D,50);
  if(name==='2d') setTimeout(draw2D,50);
}

// ===================== MAIN UPDATE =====================
let _debounce=null;
function updateAll(){
  clearTimeout(_debounce);
  _debounce=setTimeout(()=>{
    const activeTab=document.querySelector('.tab.active');
    if(activeTab&&activeTab.textContent.includes('3D')) init3D();
    else draw2D();
    updateCmd();
  },120);
}
function updateCmd(){
  const s=getState();
  document.getElementById('cmd-box').textContent=`python tools/build_world.py world_config.json --output output/world.rbxlx`;
}

// Init
pushHistory(getState());
updateAll();
window.addEventListener('resize',()=>updateAll());
</script>
