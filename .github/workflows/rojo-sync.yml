name: Rojo Sync, Validate & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Lua Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Selene (Lua linter)
        run: |
          curl -L https://github.com/Kampfkarren/selene/releases/latest/download/selene-linux.zip -o selene.zip
          unzip selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/selene

      - name: Lint Lua files
        run: selene src/

      - name: Check for syntax errors (luac)
        run: |
          sudo apt-get install -y lua5.1
          find src/ -name "*.lua" | while read f; do
            luac -p "$f" && echo "✅ $f OK" || echo "❌ $f FAILED"
          done

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rojo
        run: |
          curl -L https://github.com/rojo-rbx/rojo/releases/latest/download/rojo-linux-x86_64.zip -o rojo.zip
          unzip rojo.zip
          chmod +x rojo
          sudo mv rojo /usr/local/bin/rojo

      - name: Build .rbxm package
        run: rojo build --output roblox-procedural-worlds-${{ github.ref_name }}.rbxm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 🚀 roblox-procedural-worlds ${{ github.ref_name }}

            ### Instalare
            1. Descarcă fișierul `.rbxm` de mai jos
            2. Drag & drop în Roblox Studio
            3. Plasează în `ServerScriptService`

            ### Changelog
            Vezi [commit history](https://github.com/Gzeu/roblox-procedural-worlds/commits/main) pentru detalii.
          files: roblox-procedural-worlds-${{ github.ref_name }}.rbxm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
