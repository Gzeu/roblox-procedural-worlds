name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Syntax Validation
  # ─────────────────────────────────────────
  validate:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest
    outputs:
      lua_count: ${{ steps.count.outputs.count }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Selene binary
        id: cache-selene
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/selene
          key: selene-${{ runner.os }}-latest

      - name: Install Selene (if not cached)
        if: steps.cache-selene.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/Kampfkarren/selene/releases/latest/download/selene-linux.zip -o selene.zip
          unzip -q selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/selene

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1 --quiet

      - name: Count Lua files
        id: count
        run: echo "count=$(find src/ -name '*.lua' | wc -l)" >> $GITHUB_OUTPUT

      - name: Run Selene lint
        run: |
          echo "## 🔍 Selene Lint Results" >> $GITHUB_STEP_SUMMARY
          selene src/ 2>&1 | tee lint_output.txt
          if grep -q "error" lint_output.txt; then
            echo "❌ Lint errors found" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No lint errors in ${{ steps.count.outputs.count }} files" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run Lua syntax check
        run: |
          echo "## 🧪 Syntax Check Results" >> $GITHUB_STEP_SUMMARY
          FAILED=0
          find src/ -name "*.lua" | sort | while read f; do
            if luac -p "$f" 2>/dev/null; then
              echo "✅ $f" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $f" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint_output.txt
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Security Scan
  # ─────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets / API keys
        run: |
          echo "## 🔒 Security Scan" >> $GITHUB_STEP_SUMMARY
          FOUND=0
          PATTERNS=("api_key" "apikey" "secret" "password" "token" "private_key")
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rni "$pattern\s*=\s*['\"][^'\"]" src/ 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️ Potential secret found matching '$pattern':" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "$MATCHES" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "✅ No hardcoded secrets detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check file sizes (no large assets committed)
        run: |
          echo "## 📦 File Size Check" >> $GITHUB_STEP_SUMMARY
          find src/ -name "*.lua" -size +100k | while read f; do
            echo "⚠️ Large file: $f ($(du -sh $f | cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
          echo "✅ File size check complete" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # JOB 3: Build .rbxm (only on tag)
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build .rbxm
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Rojo binary
        id: cache-rojo
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/rojo
          key: rojo-${{ runner.os }}-latest

      - name: Install Rojo (if not cached)
        if: steps.cache-rojo.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/rojo-rbx/rojo/releases/latest/download/rojo-linux-x86_64.zip -o rojo.zip
          unzip -q rojo.zip
          chmod +x rojo
          sudo mv rojo /usr/local/bin/rojo

      - name: Build .rbxm package
        run: |
          rojo build --output roblox-procedural-worlds-${{ github.ref_name }}.rbxm
          echo "## 🏗️ Build Output" >> $GITHUB_STEP_SUMMARY
          echo "✅ Built: \`roblox-procedural-worlds-${{ github.ref_name }}.rbxm\`" >> $GITHUB_STEP_SUMMARY
          echo "📦 Size: $(du -sh roblox-procedural-worlds-${{ github.ref_name }}.rbxm | cut -f1)" >> $GITHUB_STEP_SUMMARY

      - name: Upload .rbxm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbxm-package
          path: roblox-procedural-worlds-${{ github.ref_name }}.rbxm
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: Auto Release (only on tag)
  # ─────────────────────────────────────────
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download .rbxm artifact
        uses: actions/download-artifact@v4
        with:
          name: rbxm-package

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🚀 Release ${{ github.ref_name }}"
          body: |
            ## 🎮 roblox-procedural-worlds ${{ github.ref_name }}

            ### 📥 Instalare rapidă
            1. Descarcă fișierul `.rbxm` de mai jos
            2. Drag & drop în **Roblox Studio**
            3. Plasează în `ServerScriptService`
            4. Editează `WorldConfig.lua` după nevoi
            5. Apasă **Play** — sistemele pornesc automat

            ### 📋 Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### 🔗 Resurse
            - [README](https://github.com/Gzeu/roblox-procedural-worlds#readme)
            - [Documentație module](https://github.com/Gzeu/roblox-procedural-worlds/tree/main/src)
          files: roblox-procedural-worlds-${{ github.ref_name }}.rbxm
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
